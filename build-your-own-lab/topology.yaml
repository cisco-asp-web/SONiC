# topology
#
#        s00 s01           
#         | X |  
#        l00 l01

simulation:
  no_image_copy: true

devices:
  leaf00: 
    console_ports: [40000]
    platform: spitfire_f
    os_type: sonic
    linecard_types: ['8102-64H'] 
    linux_username: "admin"
    linux_password: "password"
    custom_mgmt_inf: True
    mgmt_gateway_ip: "192.168.123.1"
    linux_config: |
        ip addr add dev eth4 192.168.123.100/24
        ip link set dev eth4 up
    xr_config: |
        sudo ip addr add dev eth4 192.168.123.100/24
        sudo config hostname leaf00
        sudo config save -y
    image: /home/cisco/images/8000-eft17.1/packages/images/8000/sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: /home/cisco/images/8000-eft17.1/packages/images/8000/sonic/sonic-cisco-8000.bin
    qemu_args: -uuid 002aac7b-2e72-45aa-9722-0456901ea895

  leaf01: 
