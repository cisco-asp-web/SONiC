connections:
  hubs:
    l00s00:         
      - leaf00.Ethernet0
      - spine00.Ethernet0

    l00s01:         
      - leaf00.Ethernet4
      - spine01.Ethernet0

    l01s00:         
      - leaf01.Ethernet0
      - spine00.Ethernet4

    l01s01:         
      - leaf01.Ethernet4
      - spine01.Ethernet4

