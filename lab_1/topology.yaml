name: 8101-32FH-O
prefix: ""

mgmt:
  network: mgt_sonic
  ipv4-subnet: 172.20.2.0/24

topology:

  nodes:

# sonic nodes
    leaf-01:
      kind: linux
      mgmt-ipv4: 172.20.2.100
      image: c8000-clab-sonic:94
      binds: 
          - /opt/cisco/images:/images

      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8101-32FH'

    leaf-02:
      kind: linux
      mgmt-ipv4: 172.20.2.101
      image: c8000-clab-sonic:94
      binds: 
          - /opt/cisco/images:/images
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8101-32FH'

    leaf-03:
      kind: linux
      mgmt-ipv4: 172.20.2.102
      image: c8000-clab-sonic:94
      binds: 
          - /opt/cisco/images:/images
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8101-32FH'

    spine-01:
      kind: linux
      mgmt-ipv4: 172.20.2.103
      image: c8000-clab-sonic:94
      binds: 
          - /opt/cisco/images:/images
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8101-32FH'

    host-01:
      kind: linux
      mgmt-ipv4: 172.20.2.104
      image: iejalapeno/alpine-srv6:1.0

    host-02:
      kind: linux
      mgmt-ipv4: 172.20.2.105
      image: iejalapeno/alpine-srv6:1.0

    host-03:
      kind: linux
      mgmt-ipv4: 172.20.2.106
      image: iejalapeno/alpine-srv6:1.0

  links:

    - endpoints: ["leaf-01:eth1", "spine-01:eth1"]
    - endpoints: ["leaf-02:eth1", "spine-01:eth2"]
    - endpoints: ["leaf-03:eth1", "spine-01:eth3"]

    - endpoints: ["leaf-01:eth2", "host-01:eth1"]
    - endpoints: ["leaf-02:eth2", "host-01:eth2"]
    - endpoints: ["leaf-02:eth3", "host-02:eth1"]
    - endpoints: ["leaf-03:eth2", "host-03:eth1"]




